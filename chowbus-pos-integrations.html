<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chowbus POS · Integrations</title>
<style>
  :root{
    --red:#DA1E40; --red-dark:#BC1635; --red-soft:#FDE8EC;
    --ink:#222530; --sub:#6b7180; --muted:#9aa0ad; --line:#ececf0;
    --bg:#F4F4F7; --side:#ffffff; --green:#16A34A; --green-soft:#E7F6EC;
    --side-w:256px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
    color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh}

  /* TOP BAR */
  .topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;flex-shrink:0;z-index:20}
  .brand{width:var(--side-w);display:flex;align-items:center;gap:9px;padding-left:20px;flex-shrink:0;transition:width .2s}
  .brand .mark{width:32px;height:32px;flex-shrink:0;object-fit:contain;border-radius:8px}
  .brand .wm{font-size:23px;font-weight:800;letter-spacing:-.5px;color:#1b1b22}
  .top-mid{display:flex;align-items:center;gap:16px;flex:1;padding:0 20px;border-left:1px solid var(--line);height:100%}
  .collapse{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    color:#6b7180;cursor:pointer}
  .collapse:hover{background:#f3f3f6}
  .crumb{font-size:14.5px;color:#3a3f4c;font-weight:600}
  .crumb .sep{color:#cfd2da;margin:0 10px;font-weight:400}
  .crumb .usa{color:#6b7180;font-weight:500}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:22px}
  .top-right .email{font-size:14px;color:#3a3f4c}
  .top-right .lang{font-size:14px;color:#3a3f4c;display:flex;align-items:center;gap:6px;cursor:pointer}
  @media(max-width:900px){.top-right .email{display:none}}

  /* BODY */
  .body{flex:1;display:flex;overflow:hidden}
  .sidebar{width:var(--side-w);background:var(--side);border-right:1px solid var(--line);overflow-y:auto;
    flex-shrink:0;padding:10px 0;transition:width .2s}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 20px;font-size:15px;color:#4b5160;
    cursor:pointer;position:relative;white-space:nowrap}
  .nav-item .ic{width:21px;height:21px;flex-shrink:0;color:#7a8090}
  .nav-item .chev{margin-left:auto;color:#bcc1cc;transition:transform .15s}
  .nav-item:hover{background:#fafafb}
  .nav-item.active{background:var(--red-soft);color:var(--red);font-weight:600}
  .nav-item.active .ic{color:var(--red)}
  .nav-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
  .lbl{transition:opacity .15s}

  /* collapsed */
  .app.collapsed .brand{width:64px}
  .app.collapsed .brand .wm{display:none}
  .app.collapsed .sidebar{width:64px}
  .app.collapsed .nav-item{padding:12px 0;justify-content:center}
  .app.collapsed .lbl,.app.collapsed .chev{display:none}

  /* MAIN */
  .main{flex:1;overflow-y:auto;padding:26px 30px 60px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:6px}
  .page-head h1{font-size:25px;letter-spacing:-.4px}
  .page-head p{font-size:14px;color:var(--sub);margin-top:5px}
  .search{position:relative}
  .search input{width:280px;max-width:60vw;padding:10px 14px 10px 38px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;background:#fff;outline:none;transition:.15s}
  .search input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#a3a8b4}

  /* TABS */
  .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0 6px}
  .tab{padding:9px 16px;border-radius:11px;font-size:14px;font-weight:600;color:#5b6170;cursor:pointer;
    border:1px solid var(--line);background:#fff;transition:.13s;display:inline-flex;align-items:center;gap:8px}
  .tab .sub{font-size:12px;font-weight:500;color:#aeb3bf}
  .tab .n{font-size:11.5px;color:#aab0bc;font-weight:700}
  .tab:hover{border-color:#cfd2da;color:#33384a}
  .tab.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 4px 12px rgba(218,30,64,.22)}
  .tab.active .sub{color:#ffc7d4}
  .tab.active .n{color:#ffd0da}
  .lang-btn{border:1px solid var(--line);border-radius:10px;padding:7px 14px;background:#fff;cursor:pointer;
    font-weight:700;color:#2f3442;font-size:13px;transition:.15s}
  .lang-btn .lang-en{color:#9aa0ad}
  .lang-btn.is-en .lang-en{color:var(--red)}
  .lang-btn.is-en .lang-zh{color:#9aa0ad}
  .lang-btn:not(.is-en) .lang-zh{color:var(--red)}
  .lang-btn:hover{background:#fafbff}

  .count{font-size:13px;color:var(--sub);margin:16px 0 12px}
  .count b{color:var(--ink)}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:1240px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:17px;display:flex;flex-direction:column;
    transition:.16s}
  .card:hover{box-shadow:0 10px 26px rgba(30,30,50,.08);transform:translateY(-2px);border-color:#e4e4ea}
  .crow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .tile{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:16px;letter-spacing:-.5px;flex-shrink:0}
  .card h3{font-size:16px;letter-spacing:-.2px}
  .catline{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:3px}
  .catdot{width:8px;height:8px;border-radius:50%}
  .card .desc{font-size:12.5px;color:var(--sub);line-height:1.45;flex:1;margin-bottom:13px;min-height:34px}
  .cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
  .connected{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--green)}
  .btn{font-size:13.5px;font-weight:700;padding:8px 18px;border-radius:9px;cursor:pointer;transition:.14s;border:1px solid}
  .btn-connect{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-connect:hover{background:var(--red-dark)}
  .btn-manage{background:#fff;color:#4b5160;border-color:var(--line)}
  .btn-manage:hover{border-color:#cfd2da}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:70px 0;font-size:15px}

  /* placeholder for non-integration nav */
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);gap:14px}
  .placeholder .pc{width:90px;height:90px;border-radius:24px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:#c8ccd6}
  .placeholder h2{color:#5b6170;font-size:20px}
  .placeholder p{font-size:14px}
</style>
</head>

let activeCat = "all";
let query = "";
let lang = "zh";
const T = {
  zh:{title:"集成市场 · Integrations Market", sub:"这里有您需要的所有餐厅工具。订餐、员工、库存、财务与团队，All in one。",
      search:"搜索集成…  Search", connect:"连接", connected:"已连接", manage:"管理",
      empty:"没有匹配的集成，换个关键词试试。",
      count:(n,c)=>`共 <b>${n}</b> 个集成${c?` · ${c}`:""}`,
      ph:"该模块为后台真实页面，此处为集成市场交互 Demo 占位。"},
  en:{title:"Integrations Market", sub:"Every restaurant tool you need — ordering, staff, inventory, finance and team. All in one.",
      search:"Search integrations…", connect:"Connect", connected:"Connected", manage:"Manage",
      empty:"No matching integrations — try another keyword.",
      count:(n,c)=>`<b>${n}</b> integration${n!==1?'s':''}${c?` · ${c}`:""}`,
      ph:"This is a real back-office module — shown here as a placeholder for the integrations demo."},
};

const main = document.getElementById("main");

function renderMain(){
  const t = T[lang];
  if(activeNav!=="integrations"){
    const nm = NAV.find(n=>n.k===activeNav);
    main.innerHTML = `<div class="placeholder">
      <div class="pc">${svg(I[nm.ic])}</div>
      <h2>${nm.t}</h2><p>${t.ph}</p></div>`;
    return;
  }
  main.innerHTML = `
    <div class="page-head">
      <div>
        <h1>${t.title}</h1>
        <p>${t.sub}</p>
      </div>
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="${t.search}" value="${query}">
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>`;

  const tabs = document.getElementById("tabs");
  tabs.innerHTML = CATS.map(c=>{
    const n = c.id==="all"?APPS.length:APPS.filter(a=>a.cats.includes(c.id)).length;
    const primary = lang==='zh'?c.zh:c.en, secondary = lang==='zh'?c.en:c.zh;
    return `<div class="tab ${c.id===activeCat?'active':''}" data-id="${c.id}">${primary}
      <span class="sub">${secondary}</span><span class="n">${n}</span></div>`;
  }).join("");
  tabs.querySelectorAll(".tab").forEach(el=>el.onclick=()=>{activeCat=el.dataset.id;renderMain();});

  const q = document.getElementById("q");
  q.oninput=()=>{query=q.value;renderGrid();};
  q.focus(); q.setSelectionRange(query.length,query.length);

  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById("grid");
  const cnt = document.getElementById("count");
  const t = T[lang];
  const ql = query.trim().toLowerCase();
  const list = APPS.filter(a=>{
    const okc = activeCat==="all"||a.cats.includes(activeCat);
    const okq = !ql || a.n.toLowerCase().includes(ql) || a.d.toLowerCase().includes(ql) || (a.de||"").toLowerCase().includes(ql)
      || a.cats.some(c=>CZ[c].includes(ql)||CE[c].toLowerCase().includes(ql)||c.includes(ql));
    return okc&&okq;
  });
  cnt.innerHTML = t.count(list.length, activeCat!=="all"?CL(activeCat):"");
  if(!list.length){grid.innerHTML=`<div class="empty">${t.empty}</div>`;return;}
  grid.innerHTML = list.map(a=>{
    const idx = APPS.indexOf(a);
    const primary = a.cats.find(c=>CC[c])||"delivery";
    const cat = `<span class="catline"><span class="catdot" style="background:${CC[primary]}"></span>${a.cats.map(c=>CL(c)).join(" · ")}</span>`;
    const desc = lang==='zh'?a.d:(a.de||a.d);
    const foot = a.on
      ? `<span class="connected"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>${t.connected}</span>
         <button class="btn btn-manage" data-i="${idx}" data-act="manage">${t.manage}</button>`
      : `<span></span><button class="btn btn-connect" data-i="${idx}" data-act="connect">${t.connect}</button>`;
    return `<div class="card">
      <div class="crow">
        <div class="tile" style="background:${a.col}">${a.ini}</div>
        <div><h3>${a.n}</h3>${cat}</div>
      </div>
      <div class="desc">${desc}</div>
      <div class="cfoot">${foot}</div>
    </div>`;
  }).join("");
  grid.querySelectorAll("button[data-act]").forEach(b=>{
    b.onclick=()=>{
      const i=+b.dataset.i;
      APPS[i].on = b.dataset.act==="connect" ? 1 : 0;
      renderGrid();
    };
  });
}

document.getElementById("collapse").onclick=()=>document.getElementById("app").classList.toggle("collapsed");

const langBtn = document.getElementById("langBtn");
langBtn.onclick=()=>{
  lang = lang==="zh" ? "en" : "zh";
  langBtn.classList.toggle("is-en", lang==="en");
  renderMain();
};

renderSidebar();
renderMain();
</script>
